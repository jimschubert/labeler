# yaml-language-server: $schema=../../schema/labeler.full.schema.json
enable:
  issues: true
  prs: false

# Fields must only contain title or body
fields:
  - title
  - invalid
  - body

comments:
  issues: 👍 Thanks for this!

labels:
  'bug':
    include:
      - '\bbug[s]?\b'
    exclude: []
    branches:
      - main
      - develop